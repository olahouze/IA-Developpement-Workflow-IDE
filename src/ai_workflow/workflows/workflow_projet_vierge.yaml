# Workflow W1 — Projet Vierge
# Brainstormer → 4 Architectes → Cartographe → [Orchestrateur ∥ Magazinier] →
# Batches Builders (Dev→Testeur→[Analyseurs]→verdict) →
# [Intégrateur ∥ Documentaliste] → Fixeur si nécessaire

name: projet-vierge
type: vierge
description: "Workflow complet pour un nouveau projet — de la conception à la livraison"
initial_state: init

states:
  - init
  - brainstorm
  - arch_produit
  - arch_metier
  - arch_gui
  - arch_technique
  - cartographe
  - fork_orch_mag
  - join_orch_mag
  - batch_builders
  - fork_int_doc
  - join_int_doc
  - fixeur
  - complete

transitions:
  - trigger: start
    source: init
    dest: brainstorm
  - trigger: done
    source: brainstorm
    dest: arch_produit
  - trigger: done
    source: arch_produit
    dest: arch_metier
  - trigger: done
    source: arch_metier
    dest: arch_gui
  - trigger: skip_gui
    source: arch_metier
    dest: arch_technique
  - trigger: done
    source: arch_gui
    dest: arch_technique
  - trigger: done
    source: arch_technique
    dest: cartographe
  - trigger: done
    source: cartographe
    dest: fork_orch_mag
  - trigger: done
    source: join_orch_mag
    dest: batch_builders
  - trigger: done
    source: batch_builders
    dest: fork_int_doc
  - trigger: done
    source: join_int_doc
    dest: fixeur
  - trigger: no_issues
    source: join_int_doc
    dest: complete
  - trigger: done
    source: fixeur
    dest: complete
  - trigger: major_issues
    source: fixeur
    dest: batch_builders

forks:
  - fork_state: fork_orch_mag
    agents:
      - orchestrateur
      - magazinier
    join_state: join_orch_mag
  - fork_state: fork_int_doc
    agents:
      - integrateur
      - documentaliste
    join_state: join_int_doc

# Mapping état → agent pour les états séquentiels
agent_mapping:
  brainstorm: brainstormer
  arch_produit: arch-produit
  arch_metier: arch-metier
  arch_gui: arch-gui
  arch_technique: arch-technique
  cartographe: cartographe
  fixeur: fixeur-integration
